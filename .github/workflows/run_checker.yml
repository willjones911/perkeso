name: PERKESO IC Checker

on:
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '1=Adaptive random (recommended)  4=Systematic A-Z'
        default: '1'
      runtime_minutes:
        description: 'Minutes to scan per job'
        default: '22'
      from_year:
        description: 'Birth year from'
        default: '1970'
      to_year:
        description: 'Birth year to'
        default: '1995'

concurrency:
  group: perkeso-checker
  cancel-in-progress: false

jobs:
  run-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IC Checker
        run: |
          python ic_checker.py \
            --mode "${{ github.event.inputs.mode || '1' }}" \
            --workers 3 \
            --from-year "${{ github.event.inputs.from_year || '1970' }}" \
            --to-year   "${{ github.event.inputs.to_year   || '1995' }}" \
            --max-runtime "${{ github.event.inputs.runtime_minutes || '22' }}"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Step 1: Back up the freshly-written result files to /tmp
          cp ic_results/master_valid.json   /tmp/master_valid.json   2>/dev/null || true
          cp ic_results/master_invalid.json /tmp/master_invalid.json 2>/dev/null || true
          cp ic_results/master_progress.json /tmp/master_progress.json 2>/dev/null || true

          # Step 2: Reset to the absolute latest remote state (handles any
          # concurrent push from another queued run cleanly)
          git fetch origin main
          git reset --hard origin/main

          # Step 3: Restore our updated files over the remote versions
          cp /tmp/master_valid.json   ic_results/master_valid.json   2>/dev/null || true
          cp /tmp/master_invalid.json ic_results/master_invalid.json 2>/dev/null || true
          cp /tmp/master_progress.json ic_results/master_progress.json 2>/dev/null || true

          # Step 4: Stage
          git add ic_results/master_valid.json \
                  ic_results/master_invalid.json \
                  ic_results/master_progress.json 2>/dev/null || true

          # Step 5: Commit only if something actually changed
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          VALID=$(python -c "import json,os; f='ic_results/master_valid.json'; print(len(json.load(open(f))) if os.path.exists(f) else 0)" 2>/dev/null || echo "?")
          INVALID=$(python -c "import json,os; f='ic_results/master_invalid.json'; print(len(json.load(open(f))) if os.path.exists(f) else 0)" 2>/dev/null || echo "?")

          git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC') | valid: ${VALID} | invalid: ${INVALID}"
          git push origin main

          echo "✅ Committed — valid: ${VALID} | invalid: ${INVALID}"
