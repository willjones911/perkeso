name: PERKESO IC Checker

on:
  schedule:
    - cron: '*/30 * * * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '1=Adaptive random (recommended)  4=Systematic A-Z'
        default: '1'
      runtime_minutes:
        description: 'Minutes to scan per job'
        default: '22'
      from_year:
        description: 'Birth year from'
        default: '1970'
      to_year:
        description: 'Birth year to'
        default: '1995'

concurrency:
  group: perkeso-checker
  cancel-in-progress: false

jobs:
  run-checker:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run IC Checker
        run: |
          python ic_checker.py \
            --mode "${{ github.event.inputs.mode || '1' }}" \
            --workers 3 \
            --from-year "${{ github.event.inputs.from_year || '1970' }}" \
            --to-year   "${{ github.event.inputs.to_year   || '1995' }}" \
            --max-runtime "${{ github.event.inputs.runtime_minutes || '22' }}"

      - name: Merge and commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch latest remote state without touching working directory
          git fetch origin main

          # Write a merge script to /tmp to avoid YAML heredoc issues
          cat > /tmp/merge_valid.py << 'PYEOF'
          import json, os, subprocess, sys

          def load(path):
              try:
                  if os.path.exists(path) and os.path.getsize(path) > 2:
                      return json.load(open(path, encoding='utf-8'))
              except Exception as e:
                  print(f"  Warning loading {path}: {e}")
              return []

          # Load what this run produced locally
          local_valid   = load('ic_results/master_valid.json')
          local_invalid = load('ic_results/master_invalid.json')

          print(f"  Local:  {len(local_valid)} valid, {len(local_invalid)} invalid")

          # Get remote version via git show (no file system conflict)
          r = subprocess.run(
              ['git', 'show', 'origin/main:ic_results/master_valid.json'],
              capture_output=True, text=True
          )
          remote_valid = json.loads(r.stdout) if r.returncode == 0 and r.stdout.strip() else []
          print(f"  Remote: {len(remote_valid)} valid")

          # Merge: union by ic_number — local version wins for duplicates
          # (local always has the freshest data from this run)
          merged = {x['ic_number']: x for x in remote_valid}
          merged.update({x['ic_number']: x for x in local_valid})
          merged_list = sorted(merged.values(), key=lambda x: x.get('checked_at', ''))

          print(f"  Merged: {len(merged_list)} unique valid records")

          # Write merged file back
          os.makedirs('ic_results', exist_ok=True)
          with open('ic_results/master_valid.json', 'w', encoding='utf-8') as f:
              json.dump(merged_list, f, indent=2, ensure_ascii=False, default=str)

          sys.exit(0)
          PYEOF

          python3 /tmp/merge_valid.py

          # Stage all result files
          git add ic_results/master_valid.json   || true
          git add ic_results/master_invalid.json || true
          git add ic_results/master_progress.json || true

          # Check diff against remote (not just HEAD) so we catch new files too
          CHANGED=$(git diff --cached origin/main -- ic_results/ | head -1)

          if [ -z "$CHANGED" ]; then
            echo "No changes vs remote. Nothing to push."
            exit 0
          fi

          VALID=$(python3 -c "import json; print(len(json.load(open('ic_results/master_valid.json'))))" 2>/dev/null || echo "?")
          INVALID=$(python3 -c "import json; print(len(json.load(open('ic_results/master_invalid.json'))))" 2>/dev/null || echo "?")

          git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC') | valid: ${VALID} | invalid: ${INVALID}"
          git push origin HEAD:main

          echo "✅ Pushed — valid: ${VALID} | invalid: ${INVALID}"
